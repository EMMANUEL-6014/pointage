<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pointage Employé</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="employee-page">

  <header class="top-bar">
    <div class="top-bar-left">
      <img id="headerLogo" src="" alt="" style="display:none;height:40px;border-radius:6px;" />
      <span class="app-name" id="companyTitle">Système de Pointage</span>
    </div>
    <div class="top-bar-right">
      <span id="empName" class="emp-badge"></span>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </header>

  <main class="emp-main">

    <div class="date-display" id="dateDisplay"></div>
    <div class="clock-display" id="clockDisplay"></div>

    <!-- Statut du jour -->
    <div class="status-card">
      <div class="status-row">
        <div class="status-item" id="arrivalStatus">
          <div class="status-dot dot-pending"></div>
          <div>
            <div class="status-label">Heure d'arrivée</div>
            <div class="status-time" id="arrivalTime">--:--</div>
            <div class="status-pos" id="posArrivalDisplay"></div>
          </div>
        </div>
        <div class="status-divider"></div>
        <div class="status-item" id="departureStatus">
          <div class="status-dot dot-pending"></div>
          <div>
            <div class="status-label">Heure de départ</div>
            <div class="status-time" id="departureTime">--:--</div>
            <div class="status-pos" id="posDepartureDisplay"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Boutons de pointage -->
    <div class="punch-buttons">
      <button class="punch-btn btn-arrival" id="btnArrival" onclick="punch('arrival')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Pointer l'Arrivée</span>
        <small class="punch-sub">Enregistre heure + position GPS</small>
      </button>
      <button class="punch-btn btn-departure" id="btnDeparture" onclick="punch('departure')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Pointer le Départ</span>
        <small class="punch-sub">Enregistre heure + position GPS</small>
      </button>
    </div>

    <!-- Motif -->
    <div class="motif-section">
      <label for="motifInput" class="motif-label">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Motif (retard, déplacement, autre…)
      </label>
      <textarea id="motifInput" placeholder="Facultatif — Indiquez ici tout motif de retard ou de déplacement en dehors du bureau." rows="3"></textarea>
      <button class="btn-save-motif" onclick="saveMotif()">Enregistrer le motif</button>
    </div>

    <div id="flashMsg" class="flash-msg" style="display:none"></div>

  </main>

  <script src="../js/storage.js"></script>
  <script src="../js/employee.js"></script>
</body>
</html>
